<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution des Tailles — RPG 2023</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-dark: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-muted: #86868b;
            --border: #3a3a3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 24px 40px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.4rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Chart area */
        .chart-container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .chart-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #chart-svg {
            width: 100%;
        }

        /* Axis styles */
        .axis text {
            fill: var(--text-muted);
            font-size: 11px;
        }

        .axis line,
        .axis path {
            stroke: var(--border);
        }

        .grid line {
            stroke: var(--border);
            stroke-opacity: 0.3;
        }

        .grid path {
            stroke-width: 0;
        }

        /* Legend */
        .legend-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .legend-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }

        .legend-btn:hover {
            border-color: var(--text-secondary);
        }

        .legend-btn.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-btn.active .legend-dot {
            box-shadow: 0 0 8px currentColor;
        }

        /* Tooltip */
        #tooltip {
            position: fixed;
            pointer-events: none;
            background: var(--card-bg);
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 260px;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 3px;
            font-size: 0.8rem;
        }

        .tooltip-label {
            color: var(--text-muted);
        }

        .tooltip-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Select all / Deselect all */
        .select-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        /* Top Navigation Bar */
        .top-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 44, 46, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            padding: 6px;
            gap: 8px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .nav-item {
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            color: white;
            background: rgba(10, 132, 255, 0.2);
            border: 1px solid rgba(10, 132, 255, 0.3);
        }

        /* Smooth curve path */
        .region-line {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: opacity 0.3s, stroke-width 0.2s;
        }

        .region-area {
            transition: opacity 0.3s;
        }

        /* Stats cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .stat-card-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        @media (max-width: 700px) {
            .top-nav {
                top: auto;
                bottom: 20px;
                flex-wrap: wrap;
                justify-content: center;
                width: 90%;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-item" title="Menu">Menu</a>
        <a href="overview-france.html" class="nav-item">National</a>
        <a href="cosmos-bubbles.html" class="nav-item">Bulles</a>
        <a href="fragmentation-combined.html" class="nav-item">Tailles</a>
        <a href="distribution-curves.html" class="nav-item active">Courbes</a>
        <a href="map.html" class="nav-item">Carte</a>
    </nav>

    <div class="main-container">
        <header>
            <h1>Profils Régionaux des Parcelles</h1>
            <div class="subtitle">Superposition des courbes de distribution par taille de parcelle —
                chaque ligne montre le profil d'une région</div>
        </header>

        <div class="stats-row" id="stats-row"></div>

        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Distribution des tailles de parcelles</div>
                <div class="controls">
                    <div class="select-actions">
                        <button class="action-btn" id="btn-select-all">Tout sélectionner</button>
                        <button class="action-btn" id="btn-deselect-all">Tout désélectionner</button>
                    </div>
                </div>
            </div>
            <svg id="chart-svg"></svg>
            <div class="legend-container" id="legend"></div>
        </div>
    </div>

    <div id="tooltip"></div>

    <script>
        // Color palette for regions — 12 distinct colors
        const REGION_COLORS = [
            "#ff6b6b", "#feca57", "#48dbfb", "#ff9ff3", "#54a0ff",
            "#5f27cd", "#01a3a4", "#f368e0", "#ff9f43", "#10ac84",
            "#ee5253", "#0abde3"
        ];

        let chartData = null;
        let activeRegions = new Set();
        let svg, x, y, width, height, margin;

        async function init() {
            try {
                const res = await fetch('data_distribution_curves.json');
                chartData = await res.json();
                setupChart();
                buildLegend();
                buildStats();
                updateChart();
            } catch (e) {
                console.error("Error loading data:", e);
            }
        }

        function setupChart() {
            const container = document.getElementById('chart-svg');
            const rect = container.parentElement.getBoundingClientRect();

            width = rect.width - 64;  // padding
            height = Math.min(500, window.innerHeight * 0.5);
            margin = { top: 20, right: 30, bottom: 50, left: 60 };

            svg = d3.select("#chart-svg")
                .attr("width", width)
                .attr("height", height)
                .attr("viewBox", [0, 0, width, height]);

            // X scale (parcel size in hectares) — use log scale for better spread
            const maxBin = chartData.bins[chartData.bins.length - 1].max;
            x = d3.scaleLog()
                .domain([0.08, Math.min(maxBin, 120)])
                .range([margin.left, width - margin.right]);

            // Y scale (percentage)
            const allPcts = Object.values(chartData.regions).flatMap(r => r.percentages);
            y = d3.scaleLinear()
                .domain([0, d3.max(allPcts) * 1.15])
                .range([height - margin.bottom, margin.top]);

            // Grid
            svg.append("g")
                .attr("class", "grid")
                .attr("transform", `translate(0,${height - margin.bottom})`)
                .call(d3.axisBottom(x)
                    .tickValues([0.1, 0.2, 0.5, 1, 2, 3, 5, 10, 20, 50, 100])
                    .tickSize(-(height - margin.top - margin.bottom))
                    .tickFormat(""));

            svg.append("g")
                .attr("class", "grid")
                .attr("transform", `translate(${margin.left},0)`)
                .call(d3.axisLeft(y)
                    .ticks(6)
                    .tickSize(-(width - margin.left - margin.right))
                    .tickFormat(""));

            // X axis
            svg.append("g")
                .attr("transform", `translate(0,${height - margin.bottom})`)
                .attr("class", "axis")
                .call(d3.axisBottom(x)
                    .tickValues([0.1, 0.2, 0.5, 1, 2, 3, 5, 10, 20, 50, 100])
                    .tickFormat(d => d >= 1 ? d + " ha" : d + ""));

            // Y axis
            svg.append("g")
                .attr("transform", `translate(${margin.left},0)`)
                .attr("class", "axis")
                .call(d3.axisLeft(y).ticks(6).tickFormat(d => d + "%"));

            // Axis labels
            svg.append("text")
                .attr("x", width / 2)
                .attr("y", height - 6)
                .attr("fill", "#94a3b8")
                .style("text-anchor", "middle")
                .style("font-size", "12px")
                .text("Surface de la parcelle (hectares, échelle logarithmique)");

            svg.append("text")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", 16)
                .attr("fill", "#94a3b8")
                .style("text-anchor", "middle")
                .style("font-size", "12px")
                .text("% des parcelles");

            // Layer groups
            svg.append("g").attr("id", "areas-layer");
            svg.append("g").attr("id", "lines-layer");
            svg.append("g").attr("id", "dots-layer");
        }

        function buildLegend() {
            const container = document.getElementById('legend');
            const regions = Object.keys(chartData.regions).sort();

            regions.forEach((region, i) => {
                const color = REGION_COLORS[i % REGION_COLORS.length];
                const btn = document.createElement('button');
                btn.className = 'legend-btn active';
                btn.dataset.region = region;
                btn.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${region}`;

                activeRegions.add(region);

                btn.addEventListener('click', () => {
                    if (activeRegions.has(region)) {
                        activeRegions.delete(region);
                        btn.classList.remove('active');
                    } else {
                        activeRegions.add(region);
                        btn.classList.add('active');
                    }
                    updateChart();
                });

                container.appendChild(btn);
            });

            // Select all / Deselect all
            document.getElementById('btn-select-all').addEventListener('click', () => {
                regions.forEach(r => activeRegions.add(r));
                document.querySelectorAll('.legend-btn').forEach(b => b.classList.add('active'));
                updateChart();
            });

            document.getElementById('btn-deselect-all').addEventListener('click', () => {
                activeRegions.clear();
                document.querySelectorAll('.legend-btn').forEach(b => b.classList.remove('active'));
                updateChart();
            });
        }

        function buildStats() {
            const container = document.getElementById('stats-row');
            const allRegions = Object.values(chartData.regions);
            const totalParcels = allRegions.reduce((s, r) => s + r.total_parcels, 0);
            const avgSize = allRegions.reduce((s, r) => s + r.avg_size * r.total_parcels, 0) / totalParcels;
            const medianSizes = allRegions.map(r => r.median_size).sort();

            const stats = [
                { value: totalParcels.toLocaleString('fr-FR'), label: "Parcelles échantillonnées" },
                { value: Object.keys(chartData.regions).length, label: "Régions" },
                { value: avgSize.toFixed(2) + " ha", label: "Surface moyenne" },
                { value: chartData.bins.length, label: "Classes de taille" }
            ];

            stats.forEach(s => {
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
                    <div class="stat-card-value">${s.value}</div>
                    <div class="stat-card-label">${s.label}</div>
                `;
                container.appendChild(card);
            });
        }

        function updateChart() {
            const regions = Object.keys(chartData.regions).sort();
            const line = d3.line()
                .x((d, i) => x(chartData.bins[i].mid))
                .y(d => y(d))
                .curve(d3.curveCardinal.tension(0.4));

            const area = d3.area()
                .x((d, i) => x(chartData.bins[i].mid))
                .y0(height - margin.bottom)
                .y1(d => y(d))
                .curve(d3.curveCardinal.tension(0.4));

            // --- Areas ---
            const areas = svg.select("#areas-layer")
                .selectAll(".region-area")
                .data(regions, d => d);

            areas.enter()
                .append("path")
                .attr("class", "region-area")
                .merge(areas)
                .transition()
                .duration(400)
                .attr("d", region => area(chartData.regions[region].percentages))
                .attr("fill", (d, i) => REGION_COLORS[i % REGION_COLORS.length])
                .attr("opacity", d => activeRegions.has(d) ? 0.06 : 0);

            areas.exit().remove();

            // --- Lines ---
            const lines = svg.select("#lines-layer")
                .selectAll(".region-line")
                .data(regions, d => d);

            lines.enter()
                .append("path")
                .attr("class", "region-line")
                .merge(lines)
                .transition()
                .duration(400)
                .attr("d", region => line(chartData.regions[region].percentages))
                .attr("stroke", (d, i) => REGION_COLORS[i % REGION_COLORS.length])
                .attr("opacity", d => activeRegions.has(d) ? 0.85 : 0)
                .attr("stroke-width", d => activeRegions.size <= 3 ? 3 : 2);

            lines.exit().remove();

            // --- Interactive dots (one per bin per visible region) ---
            const dotsData = [];
            regions.forEach((region, ri) => {
                if (!activeRegions.has(region)) return;
                chartData.regions[region].percentages.forEach((pct, bi) => {
                    dotsData.push({ region, ri, bi, pct });
                });
            });

            const dots = svg.select("#dots-layer")
                .selectAll("circle")
                .data(dotsData, d => d.region + "-" + d.bi);

            dots.enter()
                .append("circle")
                .attr("r", 4)
                .attr("fill", d => REGION_COLORS[d.ri % REGION_COLORS.length])
                .attr("opacity", 0)
                .attr("stroke", "white")
                .attr("stroke-width", 0)
                .merge(dots)
                .attr("cx", d => x(chartData.bins[d.bi].mid))
                .attr("cy", d => y(d.pct))
                .attr("fill", d => REGION_COLORS[d.ri % REGION_COLORS.length])
                .on("mouseover", function (event, d) {
                    d3.select(this)
                        .attr("opacity", 1)
                        .attr("r", 7)
                        .attr("stroke-width", 2);

                    // Highlight this region's line
                    svg.selectAll(".region-line")
                        .attr("opacity", r => r === d.region ? 1 : 0.15)
                        .attr("stroke-width", r => r === d.region ? 4 : 1.5);

                    showTooltip(event, d);
                })
                .on("mousemove", moveTooltip)
                .on("mouseout", function () {
                    d3.select(this)
                        .attr("opacity", 0)
                        .attr("r", 4)
                        .attr("stroke-width", 0);

                    svg.selectAll(".region-line")
                        .attr("opacity", d => activeRegions.has(d) ? 0.85 : 0)
                        .attr("stroke-width", activeRegions.size <= 3 ? 3 : 2);

                    hideTooltip();
                });

            dots.exit().remove();
        }

        const tooltip = document.getElementById('tooltip');

        function showTooltip(event, d) {
            const bin = chartData.bins[d.bi];
            const regionData = chartData.regions[d.region];
            tooltip.innerHTML = `
                <div class="tooltip-title" style="color:${REGION_COLORS[d.ri % REGION_COLORS.length]}">${d.region}</div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Taille parcelle :</span>
                    <span class="tooltip-value">${bin.label}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Proportion :</span>
                    <span class="tooltip-value">${d.pct.toFixed(1)}%</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Moy. région :</span>
                    <span class="tooltip-value">${regionData.avg_size} ha</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Médiane :</span>
                    <span class="tooltip-value">${regionData.median_size} ha</span>
                </div>
            `;
            tooltip.style.opacity = '1';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY - 10) + 'px';
        }

        function hideTooltip() {
            tooltip.style.opacity = '0';
        }

        // Resize
        window.addEventListener('resize', () => {
            d3.select("#chart-svg").selectAll("*").remove();
            setupChart();
            updateChart();
        });

        init();
    </script>
</body>

</html>
